name: Scheduled Upstream Sync

# Safely cancels a running sync if a new one is manually triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  schedule:
    - cron: '0 0 * * *' # Runs automatically every day at midnight UTC
  workflow_dispatch: # Allows you to manually trigger the sync anytime from the UI

jobs:
  sync_latest_from_upstream:
    runs-on: ubuntu-latest
    name: Sync latest commits from upstream repo
    
    # Crucial: Grants the runner authorization to push changes into your fork
    permissions:
      contents: write

    steps:
    # Step 1: Checkout your fork
    - name: Checkout target repo
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    # Step 2: Sync from downstream to upstream
    - name: Sync upstream changes
      id: sync
      uses: aormsby/Fork-Sync-With-Upstream-action@v3.4.1
      with:
        upstream_sync_repo: travis-wayne/fastlearners-frontend
        upstream_sync_branch: main
        target_sync_branch: main
        target_branch_checkout: main
        target_repo_token: ${{ secrets.GITHUB_TOKEN }} # Uses the token to authenticate push

    # Optional: Handle sync failures (like merge conflicts)
    - name: Check for failure
      if: steps.sync.outputs.has_new_commits == 'false' && steps.sync.outcome == 'failure'
      run: echo "Sync failed. Check for merge conflicts."
